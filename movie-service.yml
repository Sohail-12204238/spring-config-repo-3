spring:
  application:
    name: movie-service

  datasource:
    url: jdbc:mysql://localhost:3306/movie_db?createDatabseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
   port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
